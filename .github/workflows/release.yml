name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update module.json
        run: |
          jq --arg ver "${{ steps.version.outputs.VERSION }}" \
             --arg dl "https://github.com/TomazellaGames/token-light-easy/releases/download/${GITHUB_REF_NAME}/module.zip" \
             '.version = $ver | .download = $dl' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create zip
        run: |
          zip -r module.zip \
            module.json \
            README.md \
            LICENSE \
            scripts/ \
            styles/ \
            templates/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: |
            module.zip
            module.json
